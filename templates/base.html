<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% block title %}gallery-dl-viewer{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tag-list::-webkit-scrollbar { width: 4px; }
    .tag-list::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }
    /* Prevent Tailwind CDN warning banner in prod */
    body > #tailwind-warning { display: none; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <!-- Header -->
  <header class="sticky top-0 z-40 bg-gray-900 border-b border-gray-800 px-4 py-3 flex items-center gap-3 h-14">
    <a href="/" class="font-semibold text-base tracking-tight whitespace-nowrap">gallery-dl-viewer</a>
    {% block header_actions %}{% endblock %}
    <div class="flex-1"></div>
    <!-- Mobile filter toggle -->
    <button id="filter-toggle" class="md:hidden p-1.5 rounded hover:bg-gray-800 transition-colors" aria-label="Filter">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 4h18M7 12h10M11 20h2"/>
      </svg>
    </button>
  </header>

  <!-- Mobile sidebar overlay -->
  <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/60 z-30 md:hidden"></div>

  <div class="flex">
    {% block sidebar %}{% endblock %}
    <main class="flex-1 min-w-0">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
    // Mobile sidebar toggle
    const toggle = document.getElementById('filter-toggle');
    const overlay = document.getElementById('sidebar-overlay');
    const sidebar = document.getElementById('sidebar');

    function openSidebar() {
      sidebar.classList.remove('translate-x-full');
      overlay.classList.remove('hidden');
    }
    function closeSidebar() {
      sidebar.classList.add('translate-x-full');
      overlay.classList.add('hidden');
    }

    if (toggle && sidebar) {
      toggle.addEventListener('click', () => {
        sidebar.classList.contains('translate-x-full') ? openSidebar() : closeSidebar();
      });
      overlay.addEventListener('click', closeSidebar);

      // Swipe left from right edge to open (direction-locked to avoid scroll conflict)
      let swipeStartX = 0, swipeStartY = 0, swipeDir = null;
      document.addEventListener('touchstart', (e) => {
        swipeStartX = e.touches[0].clientX;
        swipeStartY = e.touches[0].clientY;
        swipeDir = null;
      }, { passive: true });
      document.addEventListener('touchmove', (e) => {
        if (swipeDir) return;
        const dx = Math.abs(e.touches[0].clientX - swipeStartX);
        const dy = Math.abs(e.touches[0].clientY - swipeStartY);
        if (dx > 5 || dy > 5) swipeDir = dx > dy ? 'h' : 'v';
      }, { passive: true });
      document.addEventListener('touchend', (e) => {
        if (swipeDir !== 'h') return;
        const dx = e.changedTouches[0].clientX - swipeStartX;
        if (dx < -60 && swipeStartX > window.innerWidth - 32) openSidebar();
        // Swipe right to close
        if (dx > 60 && !sidebar.classList.contains('translate-x-full')) closeSidebar();
      }, { passive: true });
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
